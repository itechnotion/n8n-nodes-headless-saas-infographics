<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect width="60" height="60" rx="14" fill="url(#shine)"/>

  <!-- Grid / infographic representation -->
  <!-- Top left block -->
  <rect x="10" y="10" width="16" height="10" rx="2.5" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Top right block (taller) -->
  <rect x="30" y="10" width="20" height="16" rx="2.5" fill="#ffffff" fill-opacity="0.7"/>

  <!-- Middle left tall block -->
  <rect x="10" y="24" width="16" height="16" rx="2.5" fill="#ffffff" fill-opacity="0.7"/>
  <!-- Middle right small blocks -->
  <rect x="30" y="30" width="9" height="10" rx="2" fill="#c4b5fd" fill-opacity="0.9"/>
  <rect x="41" y="30" width="9" height="10" rx="2" fill="#a78bfa" fill-opacity="0.9"/>

  <!-- Bottom row -->
  <rect x="10" y="44" width="12" height="6" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="25" y="44" width="12" height="6" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="40" y="44" width="10" height="6" rx="2" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Spark / star accent top right -->
  <circle cx="48" cy="13" r="2.5" fill="#fbbf24"/>
  <line x1="48" y1="9" x2="48" y2="11" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="15" x2="48" y2="17" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44" y1="13" x2="46" y2="13" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="13" x2="52" y2="13" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
</svg>
